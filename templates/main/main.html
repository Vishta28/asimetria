<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/medium-zoom/1.1.0/medium-zoom.min.js"></script>
    {% load static %} <link href="{% static 'css/style.css' %}" rel="stylesheet">
    {% load static %} <link href="{% static 'css/animations.css' %}" rel="stylesheet">
    {% load static %} <link href="{% static 'images/icon.jpg' %}" rel="icon" type="image/png">
    <title>Головна</title>
</head>
<body>
<div class="site">
    <header class="bg-light p-2 px-0">
        <div class="container-fluid">
            <div class="row">
                <a href="/" class="d-flex col-6 align-items-center mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
                    {% load static %}<img src="{% static 'images/logo asimetria no background.png' %}" id="icons" class="ms-2" style="width: 50px; height: 50px;">
                </a>
                <div class="col-6 d-flex justify-content-end align-items-center">
                    {% load static %}<img src="{% static 'images/telegram_logo.png' %}" id="icons" class="p-1 me-1" style="width: 37px; height: 37px;">
                    <a href="https://www.instagram.com/asimmetriia_tekstil/">
                        {% load static %}<img src="{% static 'images/instagram_logo.png' %}" id="icons" class="p-1" style="width: 40px; height: 40px;">
                    </a>
                    <a href="https://www.facebook.com/AsymmetryTekstile">
                        {% load static %}<img src="{% static 'images/facebook_logo.png' %}" id="icons" class="p-1" style="width: 45px; height: 45px;">
                    </a>
                    <button id="call-button" class="btn btn-call-mob me-2"
                        hx-get="{% url 'callback' %}"
                        hx-target=".modal-content"
                        hx-trigger="click"
                        data-bs-toggle="modal"
                        data-bs-target="#contact-modals-here">
                        {% load static %}<img src="{% static 'images/Call 01.svg' %}" id="icons" class="opacity-75" width="30" height="30">
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="contact-modals-here"
        class="modal modal-blur fade"
        style="display: none"
        aria-hidden="false"
        tabindex="-1">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content"></div>
        </div>
    </div>
    <div class="row body d-flex justify-content-center" style="width: 100%; margin: 0; padding: 0;">
        {% block content %}
        {% endblock %}
    </div>
</div>
{% include 'main/footer.html' %}
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
</body>
</html>
